<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>投稿饮品</title>
  <style>
    :root {
      --bg: #fff5f8;
      --card: #ffffff;
      --mac-pink: #f8c8e0;
      --text-main: #6b4b5b;
      --radius: 16px;
      --shadow: 0 4px 12px rgba(180,160,190,0.15);
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    body {
      background: var(--bg);
      padding: 40px 20px;
    }
    .box {
      max-width: 600px;
      background: var(--card);
      margin: 0 auto;
      padding: 32px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    h2 {
      text-align: center;
      color: #d885a3;
      margin-bottom: 28px;
    }
    .item {
      margin-bottom: 18px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #77606c;
    }
    input, select, textarea {
      width: 100%;
      padding: 11px;
      border: 1px solid #f0e4ec;
      border-radius: 10px;
      outline: none;
      background:#fffbfd;
    }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: var(--mac-pink);
      color: #704258;
      font-size: 16px;
      cursor: pointer;
      transition: 0.25s;
      margin-top: 8px;
    }
    .btn:hover {
      filter: brightness(0.95);
    }
    .back {
      background: #e9e1e6;
      color: #66555c;
    }
  </style>
</head>
<body>
<div class="box">
  <h2>✍️ 饮品投稿</h2>

  <div class="item">
    <label>品牌名称</label>
    <input id="brand" placeholder="例：喜茶、瑞幸">
  </div>
  <div class="item">
    <label>饮品名称</label>
    <input id="name" placeholder="例：珍珠奶茶">
  </div>
  <div class="item">
    <label>甜度</label>
    <select id="sugar">
      <option>无糖</option>
      <option>三分糖</option>
      <option>五分糖</option>
      <option>七分糖</option>
      <option>全糖</option>
    </select>
  </div>
  <div class="item">
    <label>冰度</label>
    <select id="ice">
      <option>去冰</option>
      <option>少冰</option>
      <option>正常冰</option>
      <option>常温</option>
    </select>
  </div>
  <div class="item">
    <label>加料</label>
    <input id="topping" placeholder="珍珠、椰果等">
  </div>
  <div class="item">
    <label>口感描述</label>
    <textarea id="desc" rows="4"></textarea>
  </div>

  <button class="btn" onclick="save()">提交投稿</button>
  <button class="btn back" onclick="location.href='index.html'">返回首页</button>
</div>

<script>
async function save() {
  let brand = document.getElementById("brand").value.trim();
  let name = document.getElementById("name").value.trim();
  let sugar = document.getElementById("sugar").value;
  let ice = document.getElementById("ice").value;
  let topping = document.getElementById("topping").value.trim();
  let desc = document.getElementById("desc").value.trim();

  if (!brand || !name) {
    alert("请填写品牌和名称");
    return;
  }

  const res = await fetch('/api/get');
  const data = await res.json();
  const list = data.list || [];

  const edit = localStorage.getItem("editDrink");
  if (edit) {
    const idx = JSON.parse(edit).idx;
    list[idx] = { brand, name, sugar, ice, topping, desc, scores: [], comments: [] };
    localStorage.removeItem("editDrink");
  } else {
    list.push({ brand, name, sugar, ice, topping, desc, scores: [], comments: [] });
  }

  await fetch('/api/save',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({list})
  });

  alert("投稿成功！");
  location.href = "index.html";
}

window.onload = ()=>{
  const edit = localStorage.getItem("editDrink");
  if(edit){
    const d = JSON.parse(edit);
    brand.value = d.brand;
    name.value = d.name;
    sugar.value = d.sugar;
    ice.value = d.ice;
    topping.value = d.topping;
    desc.value = d.desc;
  }
}
</script>
</body>
</html>
