<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>投稿饮品</title>
  <style>
    :root {
      --bg: #fff5f8;
      --card: #ffffff;
      --mac-pink: #f8c8e0;
      --text-main: #6b4b5b;
      --radius: 16px;
      --shadow: 0 4px 12px rgba(180,160,190,0.15);
    }
    * {margin:0;padding:0;box-sizing:border-box;font-family:"PingFang SC",sans-serif}
    body {background:var(--bg);padding:40px 20px}
    .box {max-width:600px;background:var(--card);margin:0 auto;padding:32px;border-radius:var(--radius);box-shadow:var(--shadow)}
    h2 {text-align:center;color:#d885a3;margin-bottom:28px}
    .item {margin-bottom:18px}
    label {display:block;margin-bottom:8px;color:#77606c}
    input,select,textarea {width:100%;padding:11px;border:1px solid #f0e4ec;border-radius:10px;outline:none;background:#fffbfd}
    .btn {width:100%;padding:12px;border:none;border-radius:10px;background:var(--mac-pink);color:#704258;font-size:16px;cursor:pointer;transition:0.25s;margin-top:8px}
    .btn:hover {filter:brightness(0.95)}
    .back {background:#e9e1e6;color:#66555c}
    .tip {margin-top:10px;color:red;text-align:center}
  </style>
</head>
<body>
<div class="box">
  <h2>✍️ 饮品投稿</h2>
  <div class="item"><label>品牌名称</label><input id="brand" placeholder="例：喜茶、瑞幸"></div>
  <div class="item"><label>饮品名称</label><input id="name" placeholder="例：珍珠奶茶"></div>
  <div class="item">
    <label>甜度</label>
    <select id="sugar">
      <option>无糖</option><option>三分糖</option><option>五分糖</option><option>七分糖</option><option>全糖</option>
    </select>
  </div>
  <div class="item">
    <label>冰度</label>
    <select id="ice">
      <option>去冰</option><option>少冰</option><option>正常冰</option><option>常温</option>
    </select>
  </div>
  <div class="item"><label>加料</label><input id="topping" placeholder="珍珠、椰果等"></div>
  <div class="item"><label>口感描述</label><textarea id="desc" rows="4"></textarea></div>

  <button class="btn" id="submitBtn">提交投稿</button>
  <button class="btn back" onclick="location.href='index.html'">返回首页</button>
  <div class="tip" id="tip"></div>
</div>

<script>
const tip = document.getElementById('tip');
const submitBtn = document.getElementById('submitBtn');

async function save() {
  tip.innerText = '';
  const brand = brand.value.trim();
  const name = name.value.trim();
  const sugar = sugar.value;
  const ice = ice.value;
  const topping = topping.value.trim();
  const desc = desc.value.trim();

  if (!brand || !name) {
    tip.innerText = '请填写品牌和名称';
    return;
  }

  submitBtn.disabled = true;
  submitBtn.innerText = '提交中...';

  try {
    // 1. 获取最新列表
    const res = await fetch("/getAllData", { cache: "no-cache" });
    if (!res.ok) throw new Error('服务器响应异常');
    const data = await res.json();
    let list = data.list || [];

    // 2. 是否编辑
    const edit = localStorage.getItem("editDrink");
    if (edit) {
      const idx = JSON.parse(edit).idx;
      list[idx] = { brand, name, sugar, ice, topping, desc, scores: [], comments: [] };
      localStorage.removeItem("editDrink");
    } else {
      list.push({ brand, name, sugar, ice, topping, desc, scores: [], comments: [] });
    }

    // 3. 保存回服务器
    const saveRes = await fetch("/setAllData", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ list })
    });

    if (!saveRes.ok) throw new Error('保存失败');

    alert("投稿成功！");
    location.href = "index.html";
  } catch (e) {
    console.error(e);
    tip.innerText = '投稿失败：' + e.message;
  } finally {
    submitBtn.disabled = false;
    submitBtn.innerText = '提交投稿';
  }
}

submitBtn.addEventListener('click', save);

window.onload = async function () {
  const edit = localStorage.getItem("editDrink");
  if (!edit) return;
  const d = JSON.parse(edit);
  brand.value = d.brand;
  name.value = d.name;
  sugar.value = d.sugar;
  ice.value = d.ice;
  topping.value = d.topping;
  desc.value = d.desc;
}
</script>
</body>
</html>
