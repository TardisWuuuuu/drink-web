<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>投稿编辑</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f0f7ff;padding:20px}
.box{max-width:600px;margin:0 auto;background:#fff;padding:25px;border-radius:15px}
h2{text-align:center;color:#2196F3;margin-bottom:20px}
.item{margin:12px 0}
label{display:block;margin-bottom:5px}
input,select,textarea{width:100%;padding:9px;border:1px #ddd solid;border-radius:8px}
.btn{width:100%;padding:11px;background:#2196F3;color:#fff;border:none;border-radius:8px;margin-top:10px;cursor:pointer}
.back{background:#ccc;color:#333}
</style>
</head>
<body>
<div class="box">
<h2>饮品投稿</h2>
<div class="item"><label>品牌</label><input id="brand"></div>
<div class="item"><label>名称</label><input id="name"></div>
<div class="item">
<label>甜度</label>
<select id="sugar">
<option>无糖</option><option>三分糖</option><option>五分糖</option><option>七分糖</option><option>全糖</option>
</select>
</div>
<div class="item">
<label>冰度</label>
<select id="ice">
<option>去冰</option><option>少冰</option><option>正常冰</option><option>常温</option>
</select>
</div>
<div class="item"><label>加料</label><input id="top"></div>
<div class="item"><label>简介</label><textarea id="desc" rows="4"></textarea></div>
<button class="btn" onclick="submitData()">提交保存</button>
<button class="btn back" onclick="location.href='index.html'">返回首页</button>
</div>

<script>
let editIndex=null;
window.onload=async function(){
  let info=localStorage.getItem('editInfo');
  if(info){
    let d=JSON.parse(info);
    editIndex=d.idx;
    brand.value=d.brand;name.value=d.name;sugar.value=d.sugar;ice.value=d.ice;top.value=d.top;desc.value=d.desc;
  }
}

async function submitData(){
  let brand=brand.value.trim(),name=name.value.trim();
  let sugar=sugar.value,ice=ice.value,top=top.value.trim(),desc=desc.value.trim();
  if(!brand||!name){alert('必填信息不能为空');return}
  let res=await fetch('/getList');
  let list=await res.json();
  let obj={brand,name,sugar,ice,top,desc,scores:[],comments:[]};
  if(editIndex!==null){
    list[editIndex]=obj;
    localStorage.removeItem('editInfo');
  }else{
    list.push(obj);
  }
  await fetch('/saveList',{method:'POST',body:JSON.stringify(list)});
  alert('提交成功');
  location.href='index.html';
}
</script>
</body>
</html>
