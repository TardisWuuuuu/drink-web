<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>投稿</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,'PingFang SC',sans-serif}
    body{background:#f6f9ff;padding:20px}
    .box{max-width:500px;background:white;padding:24px;border-radius:16px;box-shadow:0 2px 10px #0001;margin:0 auto}
    h2{text-align:center;color:#42a5f5;margin-bottom:20px}
    .item{margin-bottom:16px}
    label{display:block;margin-bottom:6px;color:#333}
    input,select,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #ddd}
    .btn{width:100%;padding:12px;background:#42a5f5;color:white;border:none;border-radius:10px;margin-top:10px;cursor:pointer}
    .back{background:#ccc;color:#333}
  </style>
</head>
<body>
<div class="box">
  <h2>✍️ 饮品投稿</h2>

  <div class="item">
    <label>品牌</label>
    <input id="brand">
  </div>
  <div class="item">
    <label>饮品名称</label>
    <input id="name">
  </div>
  <div class="item">
    <label>甜度</label>
    <select id="sugar">
      <option>无糖</option><option>三分糖</option><option>五分糖</option><option>七分糖</option><option>全糖</option>
    </select>
  </div>
  <div class="item">
    <label>冰度</label>
    <select id="ice">
      <option>去冰</option><option>少冰</option><option>正常冰</option><option>常温</option>
    </select>
  </div>
  <div class="item">
    <label>加料</label>
    <input id="topping">
  </div>
  <div class="item">
    <label>简介</label>
    <textarea id="desc" rows="4"></textarea>
  </div>

  <button class="btn" onclick="save()">提交投稿</button>
  <button class="btn back" onclick="location.href='index.html'">返回</button>
</div>

<script>
let editIdx = null
async function load(){
  let e = localStorage.getItem('edit')
  if(!e)return
  let d = JSON.parse(e)
  editIdx = d.idx
  document.getElementById('brand').value = d.brand
  document.getElementById('name').value = d.name
  document.getElementById('sugar').value = d.sugar
  document.getElementById('ice').value = d.ice
  document.getElementById('topping').value = d.topping
  document.getElementById('desc').value = d.desc
}

async function save(){
  let brand = document.getElementById('brand').value.trim()
  let name = document.getElementById('name').value.trim()
  let sugar = document.getElementById('sugar').value
  let ice = document.getElementById('ice').value
  let topping = document.getElementById('topping').value.trim()
  let desc = document.getElementById('desc').value.trim()

  if(!brand||!name){alert('请填写完整');return}

  let res = await fetch('/api/get')
  let data = await res.json()
  let list = data.list || []

  let item = {brand,name,sugar,ice,topping,desc,scores:[],comments:[]}

  if(editIdx!==null){
    list[editIdx] = item
    localStorage.removeItem('edit')
  }else{
    list.push(item)
  }

  await fetch('/api/save',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({list})
  })

  alert('投稿成功！')
  location.href='index.html'
}

load()
</script>
</body>
</html>
