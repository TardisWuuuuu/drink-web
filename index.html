<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>饮品共享</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:#f0f7ff;padding:20px}
.box{max-width:700px;margin:0 auto}
h1{text-align:center;color:#2196F3;margin:20px 0}
.btn{padding:10px 20px;border:none;border-radius:25px;background:#2196F3;color:#fff;cursor:pointer;margin:5px;transition:0.2s}
.btn:hover{opacity:0.85}
.btn-wrap{text-align:center;margin-bottom:20px}
.random-card{background:#fff;padding:20px;border-radius:15px;text-align:center;margin-bottom:20px;box-shadow:0 2px 8px #0002}
.emo-select{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:15px 0}
.emo{font-size:26px;padding:4px;border-radius:6px;cursor:pointer}
.emo.active{background:#e0edff}
.item-card{background:#fff;padding:18px;border-radius:15px;margin:15px 0;box-shadow:0 2px 8px #0002}
.info{color:#555;margin:6px 0;font-size:14px}
.score{color:#ff9800;margin:8px 0}
input,textarea{width:100%;padding:9px;margin:6px 0;border:1px #ddd solid;border-radius:8px}
.comment-item{display:flex;align-items:center;gap:8px;background:#f5f9ff;padding:8px;border-radius:8px;margin:5px 0}
</style>
</head>
<body>
<div class="box">
<h1>饮品共享榜单</h1>
<div class="btn-wrap">
<button class="btn" onclick="randDrink()">随机抽取</button>
<button class="btn" onclick="location.href='submit.html'">发布投稿</button>
</div>
<div class="random-card" id="randShow">点击按钮随机推荐饮品</div>

<div>
<p style="text-align:center">选择头像表情</p>
<div class="emo-select" id="emoBox">
<span class="emo" onclick="setAvatar('😸')">😸</span>
<span class="emo" onclick="setAvatar('🐰')">🐰</span>
<span class="emo" onclick="setAvatar('🍹')">🍹</span>
<span class="emo" onclick="setAvatar('🌸')">🌸</span>
</div>
</div>

<div id="listBox"></div>
</div>

<script>
let drinkList = [];
let myAvatar = localStorage.getItem('avt')||'🍹';

function setAvatar(emo){
  myAvatar=emo;localStorage.setItem('avt',emo);
  document.querySelectorAll('.emo').forEach(e=>e.classList.remove('active'));
  event.target.classList.add('active');
}

async function getData(){
  let res=await fetch('/getList');
  drinkList=await res.json();
  renderPage();
}

async function saveData(){
  await fetch('/saveList',{method:'POST',body:JSON.stringify(drinkList)});
}

function renderPage(){
  let html='';
  drinkList.forEach((item,idx)=>{
    let avg=item.scores?.length?(item.scores.reduce((a,b)=>a+b,0)/item.scores.length).toFixed(1):0;
    let comHtml='';
    item.comments?.forEach(c=>{
      comHtml+=`<div class="comment-item"><span style="font-size:22px">${c.avt}</span><div><div>${c.name}</div><div>${c.text}</div></div></div>`;
    })
    html+=`
    <div class="item-card">
      <h3>${item.brand} ${item.name}</h3>
      <div class="info">甜度：${item.sugar} | 冰度：${item.ice}</div>
      <div class="info">加料：${item.top||'无'}</div>
      <div class="info">简介：${item.desc}</div>
      <div class="score">综合评分：${avg}</div>
      <input placeholder="1-5分打分" id="sc${idx}" type="number" min="1" max="5">
      <button class="btn" onclick="addScore(${idx})">提交分数</button>
      <div style="margin:8px 0">${comHtml||'<div style="color:#999">暂无评论</div>'}</div>
      <input placeholder="昵称" id="nm${idx}" value="${localStorage.getItem('usr')||''}">
      <textarea placeholder="写下评论" id="ct${idx}"></textarea>
      <button class="btn" onclick="addComment(${idx})">发送评论</button>
      <button class="btn" style="background:#f44336" onclick="delItem(${idx})">删除</button>
      <button class="btn" style="background:#4CAF50" onclick="editItem(${idx})">编辑</button>
    </div>`;
  })
  document.getElementById('listBox').innerHTML=html;
  document.querySelectorAll('.emo').forEach(e=>{if(e.innerText===myAvatar)e.classList.add('active')});
}

async function addScore(idx){
  let num=Number(document.getElementById(`sc${idx}`).value);
  if(!num||num<1||num>5)return;
  if(!drinkList[idx].scores)drinkList[idx].scores=[];
  drinkList[idx].scores.push(num);
  await saveData();getData();
}

async function addComment(idx){
  let name=document.getElementById(`nm${idx}`).value.trim()||"访客";
  let text=document.getElementById(`ct${idx}`).value.trim();
  if(!text)return;
  localStorage.setItem('usr',name);
  if(!drinkList[idx].comments)drinkList[idx].comments=[];
  drinkList[idx].comments.push({name,text,avt:myAvatar});
  await saveData();getData();
}

async function delItem(idx){
  if(!confirm('确认删除'))return;
  drinkList.splice(idx,1);
  await saveData();getData();
}

function editItem(idx){
  localStorage.setItem('editInfo',JSON.stringify({...drinkList[idx],idx}));
  location.href='submit.html';
}

function randDrink(){
  if(drinkList.length===0){randShow.innerText='暂无饮品数据';return}
  let d=drinkList[Math.floor(Math.random()*drinkList.length)];
  randShow.innerHTML=`推荐：${d.brand}${d.name}<br>甜度${d.sugar} 冰度${d.ice}`;
}

window.onload=getData;
</script>
</body>
</html>
