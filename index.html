<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>饮品分享</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,'PingFang SC',sans-serif}
    body{background:#f6f9ff;color:#333;padding:20px}
    .container{max-width:700px;margin:0 auto}
    .title{text-align:center;color:#42a5f5;margin:20px 0}
    .tip{text-align:center;color:#666;margin-bottom:20px}
    .btn-bar{display:flex;gap:10px;justify-content:center;margin-bottom:20px}
    .btn{padding:10px 16px;border-radius:20px;border:none;background:#42a5f5;color:white;cursor:pointer}
    .btn-pink{background:#f48fb1}
    .btn-green{background:#81c784}
    .btn-orange{background:#ffb74d}
    .btn:hover{opacity:.9}
    .random{background:white;padding:20px;border-radius:16px;text-align:center;margin-bottom:20px;box-shadow:0 2px 10px #0001}
    .emoji-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:10px 0}
    .emoji{font-size:24px;cursor:pointer;padding:4px;border-radius:8px}
    .emoji.active{background:#e3f2fd}
    .card{background:white;padding:20px;border-radius:16px;margin-bottom:16px;box-shadow:0 2px 10px #0001}
    .card h3{margin-bottom:8px}
    .info{color:#666;margin:4px 0}
    .rating{color:#ffb300;margin:8px 0}
    .comment{background:#f1f8ff;padding:10px;border-radius:10px;margin:6px 0;display:flex;align-items:center;gap:8px}
    .comment .emo{font-size:20px}
    .comment-name{font-weight:bold}
    .input-bar{margin-top:10px}
    input,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #ddd;margin:6px 0}
    .oper{display:flex;gap:8px;margin-top:10px}
  </style>
</head>
<body>
<div class="container">
  <h1 class="title">🍹 饮品分享墙</h1>
  <p class="tip">手机电脑都能看见，实时同步</p>

  <div class="btn-bar">
    <button class="btn" onclick="getRandom()">随机推荐</button>
    <button class="btn btn-pink" onclick="location.href='submit.html'">我要投稿</button>
  </div>

  <div class="random" id="randomBox">点击随机获取饮品</div>

  <div style="margin-bottom:20px">
    <p style="text-align:center">选择你的头像：</p>
    <div class="emoji-row" id="emoList">
      <span class="emoji" onclick="setEmoji('😺')">😺</span>
      <span class="emoji" onclick="setEmoji('🐰')">🐰</span>
      <span class="emoji" onclick="setEmoji('🍹')">🍹</span>
      <span class="emoji" onclick="setEmoji('🌸')">🌸</span>
      <span class="emoji" onclick="setEmoji('🐻')">🐻</span>
      <span class="emoji" onclick="setEmoji('✨')">✨</span>
    </div>
  </div>

  <div id="list"></div>
</div>

<script>
let list = []
let myEmoji = localStorage.getItem('emo') || '🍹'
let myName = localStorage.getItem('name') || '游客'

async function load(){
  let r = await fetch('/api/get')
  let d = await r.json()
  list = d.list || []
  render()
}

function setEmoji(e){
  myEmoji = e
  localStorage.setItem('emo',e)
  document.querySelectorAll('.emoji').forEach(i=>i.classList.remove('active'))
  event.target.classList.add('active')
}

function render(){
  let html = ''
  list.forEach((it,idx)=>{
    let avg = it.scores?.length ? (it.scores.reduce((a,b)=>a+b,0)/it.scores.length).toFixed(1) : 0
    let cmHtml = ''
    it.comments?.forEach(c=>{
      cmHtml+=`
      <div class="comment">
        <span class="emo">${c.emo||'🍹'}</span>
        <div>
          <div class="comment-name">${c.nick}</div>
          <div>${c.text}</div>
        </div>
      </div>
      `
    })

    html+=`
    <div class="card">
      <h3>${it.brand}｜${it.name}</h3>
      <div class="info">甜度：${it.sugar}｜冰度：${it.ice}</div>
      <div class="info">加料：${it.topping||'无'}</div>
      <div class="info">简介：${it.desc}</div>
      <div class="rating">⭐ 评分：${avg}</div>

      <div class="input-bar">
        <input type="number" min="1" max="5" placeholder="打分1-5" id="sc${idx}">
        <button class="btn btn-green" onclick="addScore(${idx})">提交评分</button>
      </div>

      <div class="oper">
        <button class="btn btn-orange" onclick="edit(${idx})">编辑</button>
        <button class="btn btn-pink" onclick="del(${idx})">删除</button>
      </div>

      <div style="margin-top:12px">
        ${cmHtml || '<div style="color:#999;text-align:center">暂无评论</div>'}
        <input placeholder="昵称" value="${myName}" id="nk${idx}">
        <input placeholder="说点什么..." id="cm${idx}">
        <button class="btn" onclick="addComment(${idx})">发送评论</button>
      </div>
    </div>
    `
  })
  document.getElementById('list').innerHTML = html
}

async function addScore(idx){
  let v = document.getElementById('sc'+idx).value-0
  if(!v||v<1||v>5)return
  if(!list[idx].scores)list[idx].scores=[]
  list[idx].scores.push(v)
  await save()
  load()
}

async function addComment(idx){
  let nk = document.getElementById('nk'+idx).value.trim()
  let tx = document.getElementById('cm'+idx).value.trim()
  if(!tx)return
  myName = nk
  localStorage.setItem('name',nk)
  if(!list[idx].comments)list[idx].comments=[]
  list[idx].comments.push({nick:nk,text:tx,emo:myEmoji})
  await save()
  load()
}

async function del(idx){
  if(!confirm('确定删除？'))return
  list.splice(idx,1)
  await save()
  load()
}

function edit(idx){
  localStorage.setItem('edit',JSON.stringify({...list[idx],idx}))
  location.href='submit.html'
}

async function save(){
  await fetch('/api/save',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({list})
  })
}

function getRandom(){
  if(list.length===0){randomBox.innerHTML='暂无投稿';return}
  let d = list[Math.floor(Math.random()*list.length)]
  randomBox.innerHTML = `
  随机推荐：<br>
  ${d.brand} ${d.name}<br>
  甜度：${d.sugar}｜冰度：${d.ice}<br>
  简介：${d.desc}
  `
}

window.onload = ()=>{
  load()
  document.querySelectorAll('.emoji').forEach(e=>{
    if(e.innerText===myEmoji)e.classList.add('active')
  })
}
</script>
</body>
</html>
