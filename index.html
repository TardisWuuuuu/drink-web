<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>饮品分享站</title>
    <style>
        *{margin: 0;padding: 0;box-sizing: border-box;}
        body{
            background-color: #f5f0eb;
            font-family: "Microsoft Yahei",sans-serif;
        }
        .container{
            width: 90%;
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        h1{
            text-align: center;
            color: #6b4f4f;
            margin-bottom: 30px;
        }
        .nav-btn{
            display: block;
            width: 180px;
            height: 45px;
            line-height: 45px;
            text-align: center;
            background: #c9a88c;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            margin: 0 auto;
            font-size: 16px;
            transition: 0.3s;
        }
        .nav-btn:hover{
            background: #b08c6d;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>美味饮品分享平台</h1>
        <a href="submit.html" class="nav-btn">提交你的饮品</a>
