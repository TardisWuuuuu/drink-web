<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>饮品投稿</title>
  <style>
    :root {
      --bg-main: #f6f9fa;
      --card-white: #ffffff;
      --text-dark: #384047;
      --text-gray: #6b7280;
      --line: #e2e8f0;
      --color-sky: #b3e5fc;
      --color-rose: #f8bbd0;
      --radius-sm: 8px;
      --radius-md: 14px;
      --shadow: 0 3px 12px rgba(0,0,0,0.06);
      --easy: all 0.25s ease;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    body {
      background-color: var(--bg-main);
      padding: 30px 16px;
      animation: fadeIn 0.6s ease;
    }
    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(10px);}
      to {opacity: 1; transform: translateY(0);}
    }
    .box {
      max-width: 520px;
      background: var(--card-white);
      padding: 35px;
      border-radius: var(--radius-md);
      margin: 0 auto;
      box-shadow: var(--shadow);
      border-top:5px solid #93c5fd;
    }
    .back {
      color: #60a5fa;
      text-decoration: none;
      font-size: 14px;
    }
    h2 {
      text-align: center;
      margin: 20px 0 30px;
      background: linear-gradient(90deg,#60a5fa,#f472b6);
      -webkit-background-clip: text;
      color: transparent;
    }
    .item {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 7px;
      color: var(--text-dark);
      font-weight: 500;
    }
    input,select,textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: #fafbfc;
      outline: none;
      transition: var(--easy);
    }
    input:focus,select:focus,textarea:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 3px rgba(147,197,253,0.25);
    }
    button {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(120deg,#93c5fd,#f9a8d4);
      color: #fff;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--easy);
    }
    button:hover {
      opacity: 0.9;
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }
  </style>
</head>
<body>
<div class="box">
  <a href="index.html" class="back">← 返回首页</a>
  <h2 id="titleText">新增饮品投稿</h2>

  <div class="item">
    <label>饮品品牌</label>
    <input id="brand" placeholder="喜茶、古茗、奈雪等">
  </div>
  <div class="item">
    <label>饮品名称 <span style="color:#f472b6">*</span></label>
    <input id="drinkName" placeholder="请填写名称">
  </div>
  <div class="item">
    <label>甜度</label>
    <select id="sugar">
      <option>不另外加糖</option>
      <option>三分糖</option>
      <option>五分糖</option>
      <option>七分糖</option>
      <option>全糖</option>
    </select>
  </div>
  <div class="item">
    <label>冰量</label>
    <select id="ice">
      <option>去冰</option>
      <option>少冰</option>
      <option>正常冰</option>
      <option>热饮</option>
    </select>
  </div>
  <div class="item">
    <label>添加小料</label>
    <input id="topping" placeholder="珍珠、椰果、奶盖">
  </div>
  <div class="item">
    <label>口味评价</label>
    <textarea id="desc" rows="3" placeholder="写下真实口感体验"></textarea>
  </div>

  <button onclick="submitData()" id="btnText">确认提交</button>
</div>

<script>
let editInfo = null;
window.onload = function(){
  let str = localStorage.getItem("editDrink");
  if(str){
    editInfo = JSON.parse(str);
    document.getElementById("titleText").innerText = "编辑饮品资料";
    document.getElementById("btnText").innerText = "保存修改";
    document.getElementById("brand").value = editInfo.brand||"";
    document.getElementById("drinkName").value = editInfo.name||"";
    document.getElementById("sugar").value = editInfo.sugar||"不另外加糖";
    document.getElementById("ice").value = editInfo.ice||"去冰";
    document.getElementById("topping").value = editInfo.topping||"";
    document.getElementById("desc").value = editInfo.desc||"";
    localStorage.removeItem("editDrink");
  }
};

async function submitData(){
  let name = document.getElementById("drinkName").value.trim();
  if(!name) return alert("请填写饮品名称！");
  let data = {
    brand:document.getElementById("brand").value.trim(),
    name:name,
    sugar:document.getElementById("sugar").value,
    ice:document.getElementById("ice").value,
    topping:document.getElementById("topping").value.trim(),
    desc:document.getElementById("desc").value.trim()
  };
  if(editInfo){
    let res = await fetch("/api/list");
    let list = await res.json();
    list[editInfo.idx] = {...list[editInfo.idx],...data};
    await fetch("/api/saveAll",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(list)
    });
    alert("修改成功！");
  }else{
    await fetch("/api/add",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(data)
    });
    alert("投稿成功！");
  }
  location.href="index.html";
}
</script>
</body>
</html>
